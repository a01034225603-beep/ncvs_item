name: Windows 인스톨러 빌드

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '빌드할 브랜치 (기본: feature/map-topology)'
        required: false
        default: 'feature/map-topology'
  # 버전 태그 push 시 자동 실행
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest   # ← GitHub이 제공하는 무료 Windows 서버

    steps:
      # ── 1. 코드 체크아웃 ─────────────────────────────────────────────────
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Node.js 22 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. Python 설치 ───────────────────────────────────────────────────
      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 4. Python 빌드 의존성 설치 ───────────────────────────────────────
      - name: PyInstaller + 트레이 의존성 설치
        run: pip install pyinstaller pystray pillow

      - name: 프론트엔드 경로 확인
        shell: pwsh
        run: |
          if (Test-Path "frontend\package.json") {
            "FRONTEND_DIR=frontend" | Out-File -FilePath $env:GITHUB_ENV -Append
          } elseif (Test-Path "scripts\frontend\package.json") {
            "FRONTEND_DIR=scripts/frontend" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            Write-Error "frontend/package.json 을 찾을 수 없습니다."
            exit 1
          }

      - name: 프론트엔드 의존성 설치
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: 프론트엔드 빌드
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      # ── 6. dist 디렉터리 구성 ────────────────────────────────────────────
      - name: dist 구성 — 프론트엔드
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path scripts\dist\frontend | Out-Null
          Copy-Item -Recurse -Force frontend\.next\standalone\* scripts\dist\frontend\
          $staticDst = "scripts\dist\frontend\.next\static"
          New-Item -ItemType Directory -Force -Path $staticDst | Out-Null
          if (Test-Path "frontend\.next\static") {
            Copy-Item -Recurse -Force "frontend\.next\static\*" $staticDst
          }
          if (Test-Path "frontend\public") {
            Copy-Item -Recurse -Force "frontend\public" "scripts\dist\frontend\public"
          }
          Write-Host "프론트엔드 dist 완료"

      - name: dist 구성 — 백엔드
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path scripts\dist\backend | Out-Null
          Copy-Item -Recurse -Force backend\app     scripts\dist\backend\app
          Copy-Item -Recurse -Force backend\alembic scripts\dist\backend\alembic
          Copy-Item -Force backend\alembic.ini      scripts\dist\backend\
          Copy-Item -Force backend\pyproject.toml   scripts\dist\backend\
          Write-Host "백엔드 dist 완료"

      - name: dist 구성 — 환경변수
        shell: pwsh
        run: |
          Copy-Item -Force backend\.env.local scripts\dist\.env
          Write-Host "환경변수 복사 완료"

      # ── 7. Python embeddable 런타임 다운로드 ─────────────────────────────
      - name: Python embeddable 런타임 준비
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile python-embed.zip -UseBasicParsing
          New-Item -ItemType Directory -Force -Path scripts\dist\python | Out-Null
          Expand-Archive -Path python-embed.zip -DestinationPath scripts\dist\python -Force

          # pip 활성화 (._pth 파일에서 import site 주석 해제)
          $pth = Get-ChildItem "scripts\dist\python" -Filter "*._pth" | Select-Object -First 1
          if ($pth) {
            $c = Get-Content $pth.FullName -Raw
            $c = $c -replace '#import site', 'import site'
            Set-Content -Path $pth.FullName -Value $c -NoNewline
          }

          # pip 설치
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile get-pip.py -UseBasicParsing
          & "scripts\dist\python\python.exe" get-pip.py --quiet
          if ($LASTEXITCODE -ne 0) { throw "pip 설치 실패" }

          # 백엔드 패키지 설치
          $pkgs = "fastapi", "uvicorn[standard]", "sqlalchemy", "aiosqlite", "alembic", "pyjwt", "passlib[bcrypt]", "python-multipart"
          & "scripts\dist\python\python.exe" -m pip install $pkgs --quiet --no-warn-script-location
          if ($LASTEXITCODE -ne 0) { throw "패키지 설치 실패" }
          Write-Host "Python 런타임 완료"

      # ── 8. PyInstaller 런처 빌드 ─────────────────────────────────────────
      - name: 트레이 런처 빌드 (PyInstaller)
        shell: pwsh
        working-directory: scripts\launcher
        run: |
          pyinstaller launcher.py `
            --name NCVS `
            --onefile `
            --distpath ..\dist `
            --workpath ..\build_tmp `
            --noconfirm `
            --noconsole
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller 빌드 실패" }

      - name: 런처 실행파일 검증
        shell: pwsh
        run: |
          if (-not (Test-Path "scripts\dist\NCVS.exe")) {
            Write-Error "scripts\dist\NCVS.exe가 생성되지 않았습니다. 실제 출력 목록:"
            Get-ChildItem -Recurse scripts\dist -Filter "*.exe" | Select-Object FullName
            exit 1
          }
          Write-Host "런처 준비 완료: scripts\dist\NCVS.exe"

      # ── 9. Inno Setup 인스톨러 컴파일 ────────────────────────────────────
      - name: Inno Setup 설치
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: 인스톨러 컴파일
        shell: pwsh
        working-directory: scripts
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          Write-Host "ISCC: $iscc"
          & $iscc setup.iss
          if ($LASTEXITCODE -ne 0) { throw "인스톨러 컴파일 실패" }

      # ── 10. 결과물 업로드 ────────────────────────────────────────────────
      - name: 인스톨러 업로드 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: NCVS_Setup
          path: scripts/Output/NCVS_Setup.exe
          retention-days: 30   # 30일간 다운로드 가능
